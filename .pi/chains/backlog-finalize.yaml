description: Review the task record to see if it is properly finalized
loop: 20
steps:
  - prompt: |
      Review task $ARGUMENTS for finalization issues.

      1. Read the workflow guide: `backlog://workflow/task-finalization`
      2. Use `task_view` to read the full task details
      3. Check all acceptance criteria and Definition of Done items are verified and checked off
      4. Verify an implementation plan exists and reflects the final solution
      5. Verify a Final Summary has been written
      6. Confirm task status reflects the true state of the work

      If any issues are found, rank by severity (1-10, 10 = most severe):
      - 9-10 Critical: Task record is fundamentally incomplete or misleading
      - 7-8 High: Major finalization steps missing (no summary, unchecked critical criteria)
      - 5-6 Medium: Minor gaps (missing edge-case verification, incomplete DoD)
      - 3-4 Low: Style or clarity improvements
      - 1-2 Trivial: Cosmetic suggestions

      List all issues with severity and proposed fixes. Wait for my approval before making changes.
  - type: exitPrompt
    exitPrompt: There are no issues with severity >= 5
  - prompt: |
      Proceed with fixing all remaining finalization issues with severity >= 5.

      Prefer using the backlog MCP tools (`task_edit`) over directly editing files.
      Fix all qualifying issues before reporting completion.
